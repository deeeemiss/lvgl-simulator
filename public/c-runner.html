<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>LVGL C Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas#canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script>
    var params = new URLSearchParams(location.search);
    var id     = params.get('id');

    function notifyParent(type, payload) {
      try {
        if (window.parent && window.parent !== window)
          window.parent.postMessage(Object.assign({ type: type }, payload), '*');
      } catch(e) {}
    }

    // Forward uncaught JS errors to the parent output panel
    window.onerror = function(msg, src, line, col, err) {
      notifyParent('stderr', { text: '[js] ' + msg + (src ? ' ' + src + ':' + line : '') });
    };
    window.addEventListener('unhandledrejection', function(e) {
      notifyParent('stderr', { text: '[js] Unhandled rejection: ' + (e.reason || e) });
    });

    if (!id) {
      notifyParent('error', { message: 'c-runner: no artifact id' });
    } else {
      var canvas = document.getElementById('canvas');

      window.Module = {
        canvas: canvas,                          // SDL2/EGL uses this canvas
        print:    function(text) { notifyParent('stdout', { text: text }); },
        printErr: function(text) { notifyParent('stderr', { text: text }); },
        onAbort: function(what) {
          notifyParent('stderr', { text: '[abort] ' + what });
        },
        quit: function(status) {
          notifyParent(status !== 0
            ? 'error'
            : 'stdout',
            status !== 0
              ? { message: 'Program exited with status ' + status }
              : { text: 'Program exited normally' });
          if (status !== 0) notifyParent('status', { status: 'error' });
        },
      };

      var script     = document.createElement('script');
      script.src     = '/api/artifact/' + id + '/output.js';
      script.onerror = function() {
        notifyParent('error', { message: 'Failed to load artifact: ' + id });
        notifyParent('status', { status: 'error' });
      };
      document.body.appendChild(script);
    }
  </script>
</body>
</html>
