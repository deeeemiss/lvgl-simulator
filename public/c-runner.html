<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>LVGL C Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas#canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script>
    var params = new URLSearchParams(location.search);
    var id     = params.get('id');

    function notifyParent(type, payload) {
      try {
        if (window.parent && window.parent !== window)
          window.parent.postMessage(Object.assign({ type: type }, payload), '*');
      } catch(e) {}
    }

    if (!id) {
      notifyParent('error', { message: 'c-runner: no artifact id' });
    } else {
      window.Module = {
        print:    function(text) { notifyParent('stdout', { text: text }); },
        printErr: function(text) { notifyParent('stderr', { text: text }); },
        quit: function(status) {
          if (status !== 0) {
            notifyParent('error', { message: 'Program exited with status ' + status });
            notifyParent('status', { status: 'error' });
          }
        },
      };

      var script     = document.createElement('script');
      script.src     = '/api/artifact/' + id + '/output.js';
      script.onerror = function() {
        notifyParent('error', { message: 'Failed to load artifact: ' + id });
        notifyParent('status', { status: 'error' });
      };
      document.body.appendChild(script);
    }
  </script>
</body>
</html>
