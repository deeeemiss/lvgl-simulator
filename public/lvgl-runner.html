<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>LVGL Runner</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <style>body { margin: 0; padding: 0; }</style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/BrowserFS/2.0.0/browserfs.js"></script>
  <script src="/wasm/wasm_file_api.js"></script>
  <script>
    var _origQuery = document.querySelector.bind(document);
    document.querySelector = function(sel) {
      if (sel === '#canvas') return window.top.document.getElementById('lvgl-canvas');
      return _origQuery(sel);
    };
  </script>
  <script src="/wasm/micropython.js"></script>
  <script>
    Module.canvas = window.top.document.getElementById('lvgl-canvas');

    var isReady     = false;
    var isRunning   = false;
    var executingCode = false; // true while mp_js_do_str is active
    var pendingCode = null;
    var currentSleepingResolve = null;
    var lastPromise = null;    // tracks in-flight mp_handle_pending / mp_js_process_char
    var inputChars  = [];

    window.do_sleep_with_intr = function(ms, cb) {
      var i = setTimeout(function() { currentSleepingResolve = null; cb(0); }, ms);
      currentSleepingResolve = function() {
        clearTimeout(i); currentSleepingResolve = null; cb(1);
      };
    };

    var SCREEN_RESET =
      'import lvgl as lv\n' +
      '_scr = lv.obj(None)\n' +
      'lv.screen_load(_scr)\n';

    async function runCode(code) {
      if (isRunning) { pendingCode = code; return; }
      isRunning   = true;
      executingCode = true;
      // Drain any in-flight mp_handle_pending before starting mp_js_do_str.
      // Both are asyncified; WASM aborts if two are active simultaneously.
      if (lastPromise) { try { await lastPromise; } catch(_){} lastPromise = null; }
      try {
        window.parent.postMessage({ type: 'status', status: 'running' }, '*');
        await mp_js_do_str(
          SCREEN_RESET +
          code + '\n' +
          'import lvgl as lv\n' +
          'lv.tick_inc(100)\n' +
          'lv.timer_handler()'
        );
        window.parent.postMessage({ type: 'status', status: 'ready' }, '*');
      } catch(e) {
        var msg = e && e.message ? e.message : String(e);
        window.parent.postMessage({ type: 'error', message: msg }, '*');
        window.parent.postMessage({ type: 'status', status: 'error' }, '*');
      }
      executingCode = false;
      isRunning     = false;
      if (pendingCode !== null) {
        var next = pendingCode; pendingCode = null;
        runCode(next);
      }
    }

    window.addEventListener('message', function(evt) {
      if (!evt.data) return;
      if (evt.data.type === 'run') {
        if (!isReady) { pendingCode = evt.data.code; return; }
        runCode(evt.data.code);
      } else if (evt.data.type === 'interrupt' && currentSleepingResolve) {
        currentSleepingResolve();
      }
    });

    window.startRunning = async function() {
      var params = new URLSearchParams(location.search);
      var W = parseInt(params.get('w') || '480', 10);
      var H = parseInt(params.get('h') || '320', 10);

      mp_js_init(4 * 1024 * 1024);

      await mp_js_do_str(
        'import lvgl as lv\n' +
        'if not lv.is_initialized(): lv.init()\n' +
        'lv.sdl_window_create(' + W + ', ' + H + ')\n'
      );

      var mp_handle_pending = Module.cwrap('mp_handle_pending', null, [], { async: true });

      async function handle_pending() {
        var t0 = performance.now();
        // Skip all WASM calls while mp_js_do_str is running to avoid asyncify conflict
        if (!executingCode) {
          while (inputChars.length > 0) {
            var c = inputChars.shift();
            if (c === 3 && currentSleepingResolve) {
              currentSleepingResolve();
              if (lastPromise) { try { await lastPromise; } catch(_){} lastPromise = null; }
            } else {
              if (lastPromise) { try { await lastPromise; } catch(_){} lastPromise = null; }
              lastPromise = mp_js_process_char(c);
            }
          }
          if (!currentSleepingResolve) {
            if (lastPromise) { await lastPromise; }
            lastPromise = mp_handle_pending();
          }
        }
        setTimeout(handle_pending, executingCode ? 10 : Math.max(0, 5 - (performance.now() - t0)));
      }

      mp_js_init_repl();
      handle_pending();

      isReady = true;
      window.parent.postMessage({ type: 'ready' }, '*');

      if (pendingCode !== null) {
        var code = pendingCode; pendingCode = null;
        runCode(code);
      }
    };
  </script>
</body>
</html>
